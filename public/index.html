<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaBurgertory — Order Online</title>
  <meta name="description" content="Order from LaBurgertory — Smash. Stack. Devour." />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e8541a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    .hero {
      background: linear-gradient(135deg, #1a0800 0%, #0f0f0f 60%);
      border-bottom: 1px solid var(--border);
      padding: 48px 20px 40px;
      text-align: center;
    }
    .hero-logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
    .hero-logo span { color: var(--accent); }
    .hero-tagline { color: var(--text2); font-size: 1rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }
    .hero-track { margin-top: 20px; }
    .track-form { display: flex; gap: 8px; max-width: 400px; margin: 0 auto; }
    .cat-section { max-width: 1200px; margin: 0 auto; padding: 0 0 80px; }
    .cat-section-title {
      font-size: 1.3rem; font-weight: 800; padding: 20px 20px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .cat-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-anchor { scroll-margin-top: 110px; }
  </style>
</head>
<body>

<!-- Offline banner -->
<div id="offline-banner"></div>

<!-- Public nav -->
<nav class="pub-nav">
  <div class="pub-nav-inner">
    <div class="pub-logo">La<span>Burgertory</span></div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-ghost btn-sm" id="track-btn" onclick="showTrackModal()">Track Order</button>
      <button class="cart-btn" id="cart-open-btn" onclick="openCart()">
        🛒 Cart <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-logo">La<span>Burgertory</span></div>
  <div class="hero-tagline">Smash · Stack · Devour</div>
</div>

<!-- Category tabs -->
<div class="cat-tabs-wrap">
  <div class="cat-tabs" id="cat-tabs"></div>
</div>

<!-- Menu sections -->
<div class="cat-section" id="menu-sections">
  <div class="spinner"></div>
</div>

<!-- Cart drawer -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h3>Your Order</h3>
    <button class="btn btn-ghost btn-sm btn-icon" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="empty-state"><div class="icon">🛒</div><p>Your cart is empty</p></div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="cart-total">₱0.00</span>
    </div>
    <button class="btn btn-primary w-full btn-lg" onclick="startCheckout()" id="checkout-btn">
      Proceed to Checkout
    </button>
  </div>
</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h3 id="checkout-modal-title">Checkout</h3>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeModal('checkout-modal')">✕</button>
    </div>
    <div id="checkout-modal-body"></div>
  </div>
</div>

<!-- Track Order Modal -->
<div class="modal-overlay" id="track-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>Track Your Order</h3>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeModal('track-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Order Number</label>
        <input type="text" class="form-input" id="track-input" placeholder="Paste your order ID..." />
      </div>
      <button class="btn btn-primary w-full mt-4" onclick="trackOrder()">Track</button>
      <div id="track-result" class="mt-4"></div>
    </div>
  </div>
</div>

<!-- Order Submitted Modal -->
<div class="modal-overlay" id="order-success-modal">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <h3>Order Placed! 🎉</h3>
    </div>
    <div class="modal-body" id="order-success-body"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal('order-success-modal');resetCart()">Done</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/utils.js"></script>
<script src="/js/idb-queue.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
